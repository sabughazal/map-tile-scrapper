<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Auto Tile Downloader</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css">
	<link rel="stylesheet" href="/static/css/auto.css">
	<link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
</head>
<body>
	<div id="map" aria-label="Map"></div>

	<nav class="page-nav" aria-label="Page navigation">
		<a class="page-link" href="/">Map Preview</a>
		<a class="page-link current" href="/auto">Auto Downloader</a>
		<a class="page-link" href="/geotiff">GeoTIFF Export</a>
	</nav>
	<aside class="side-panel">
		<h1>Auto Tile Downloader</h1>
		<p class="muted">Draw a rectangle and choose zoom levels to prefetch tiles into cache.</p>

		<section class="tool-row">
			<button id="drawBtn" type="button">Draw Rectangle</button>
			<button id="clearBtn" type="button" class="secondary">Clear</button>
		</section>

		<section class="extent-box">
			<h2>Selected Extent</h2>
			<pre id="extentText">No area selected</pre>
		</section>

		<section class="zoom-box">
			<div class="section-head">
				<h2>Zoom Levels</h2>
				<div class="quick-actions">
					<button id="selectAllZoom" type="button" class="secondary small">All</button>
					<button id="clearZoom" type="button" class="secondary small">None</button>
				</div>
			</div>
			<div id="zoomList" class="zoom-list"></div>
		</section>

		<section class="backoff-box">
			<h2>404 Backoff</h2>
			<label class="backoff-toggle">
				<input id="backoffEnabled" type="checkbox" checked>
				<span>Slow down on too many 404 responses</span>
			</label>
			<div class="backoff-grid">
				<label>
					<span>Window</span>
					<input id="backoffWindow" type="number" min="10" max="200" value="40">
				</label>
				<label>
					<span>404 trigger</span>
					<input id="backoffThreshold" type="number" min="1" max="200" value="10">
				</label>
				<label>
					<span>Step (ms)</span>
					<input id="backoffStep" type="number" min="50" max="5000" value="250">
				</label>
				<label>
					<span>Max delay (ms)</span>
					<input id="backoffMax" type="number" min="100" max="15000" value="2000">
				</label>
			</div>
			<p class="muted backoff-status">Current delay: <strong id="backoffStatus">0ms</strong></p>
		</section>

		<section class="tool-row">
			<button id="downloadBtn" type="button">Start Download</button>
		</section>

		<section class="responses-box">
			<h2>Tile Counter Responses</h2>
			<pre id="responsesText">No requests yet</pre>
		</section>
	</aside>

	<script src="https://cdn.jsdelivr.net/npm/ol@9.2.4/dist/ol.js"></script>
	<script>
		const MAX_ZOOM = 21;
		const MIN_ZOOM = 2;

		const ui = {
			drawBtn: document.getElementById("drawBtn"),
			clearBtn: document.getElementById("clearBtn"),
			downloadBtn: document.getElementById("downloadBtn"),
			backoffEnabled: document.getElementById("backoffEnabled"),
			backoffWindow: document.getElementById("backoffWindow"),
			backoffThreshold: document.getElementById("backoffThreshold"),
			backoffStep: document.getElementById("backoffStep"),
			backoffMax: document.getElementById("backoffMax"),
			backoffStatus: document.getElementById("backoffStatus"),
			selectAllZoom: document.getElementById("selectAllZoom"),
			clearZoom: document.getElementById("clearZoom"),
			zoomList: document.getElementById("zoomList"),
			extentText: document.getElementById("extentText"),
			responsesText: document.getElementById("responsesText")
		};

		const drawSource = new ol.source.Vector();
		const drawLayer = new ol.layer.Vector({
			source: drawSource,
			style: new ol.style.Style({
				stroke: new ol.style.Stroke({ color: "#fbbf24", width: 2 }),
				fill: new ol.style.Fill({ color: "rgba(251, 191, 36, 0.15)" })
			})
		});

		const drawInteraction = new ol.interaction.Draw({
			source: drawSource,
			type: "Circle",
			geometryFunction: ol.interaction.Draw.createBox()
		});
		drawInteraction.setActive(false);

		const map = new ol.Map({
			target: "map",
			controls: ol.control.defaults.defaults({
				zoom: false
			}),
			layers: [
				new ol.layer.Tile({
					source: new ol.source.XYZ({
						url: "/scrapper/{z}/{x}/{y}",
						maxZoom: MAX_ZOOM
					})
				}),
				drawLayer
			],
			view: new ol.View({
				center: ol.proj.fromLonLat([54, 24]),
				zoom: 8,
				minZoom: MIN_ZOOM,
				maxZoom: MAX_ZOOM
			})
		});
		map.addInteraction(drawInteraction);

		let selectedGeometry = null;

		function appendResponse(message) {
			if (ui.responsesText.textContent === "No requests yet") {
				ui.responsesText.textContent = message;
				ui.responsesText.scrollTop = ui.responsesText.scrollHeight;
				return;
			}
			ui.responsesText.textContent += `\n${message}`;
			ui.responsesText.scrollTop = ui.responsesText.scrollHeight;
		}

		function sleep(ms) {
			return new Promise((resolve) => setTimeout(resolve, ms));
		}

		function getBackoffConfig() {
			return {
				enabled: ui.backoffEnabled.checked,
				window: Math.max(10, Number(ui.backoffWindow.value) || 40),
				threshold: Math.max(1, Number(ui.backoffThreshold.value) || 10),
				stepMs: Math.max(50, Number(ui.backoffStep.value) || 250),
				maxDelayMs: Math.max(100, Number(ui.backoffMax.value) || 2000)
			};
		}

		function renderBackoffStatus(delayMs) {
			ui.backoffStatus.textContent = `${delayMs}ms`;
		}

		function latToTileY(lat, z) {
			const latRad = (Math.max(-85.05112878, Math.min(85.05112878, lat)) * Math.PI) / 180;
			const n = 2 ** z;
			return Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
		}

		function lonToTileX(lon, z) {
			const normalizedLon = Math.max(-180, Math.min(180, lon));
			const n = 2 ** z;
			return Math.floor(((normalizedLon + 180) / 360) * n);
		}

		function getSelectedExtent() {
			if (!selectedGeometry) {
				return null;
			}

			const [minX, minY, maxX, maxY] = selectedGeometry.getExtent();
			const lowerLeft = ol.proj.toLonLat([minX, minY]);
			const upperRight = ol.proj.toLonLat([maxX, maxY]);

			return {
				minX: lowerLeft[0],
				minY: lowerLeft[1],
				maxX: upperRight[0],
				maxY: upperRight[1]
			};
		}

		function getSelectedZoomLevels() {
			const checkboxes = ui.zoomList.querySelectorAll("input[type='checkbox']:checked");
			return Array.from(checkboxes).map((box) => Number(box.value));
		}

		function tileTasksForExtent(extent, z) {
			const xMinRaw = lonToTileX(extent.minX, z);
			const xMaxRaw = lonToTileX(extent.maxX, z);
			const yMinRaw = latToTileY(extent.maxY, z);
			const yMaxRaw = latToTileY(extent.minY, z);

			const xMin = Math.min(xMinRaw, xMaxRaw);
			const xMax = Math.max(xMinRaw, xMaxRaw);
			const yMin = Math.min(yMinRaw, yMaxRaw);
			const yMax = Math.max(yMinRaw, yMaxRaw);

			const tasks = [];
			for (let x = xMin; x <= xMax; x += 1) {
				for (let y = yMin; y <= yMax; y += 1) {
					tasks.push({ z, x, y });
				}
			}
			return tasks;
		}

		async function fetchTileCount(extent, z) {
			const response = await fetch("/scrapper/get-tile-count", {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify({ extent, z })
			});
			if (!response.ok) {
				throw new Error(`Tile count failed for z=${z} with ${response.status}`);
			}
			return response.json();
		}

		async function downloadTiles(tasks, backoffConfig, concurrency = 8) {
			let index = 0;
			let completed = 0;
			const recent404 = [];
			let currentDelayMs = 0;

			function registerStatus(status) {
				recent404.push(status === 404 ? 1 : 0);
				if (recent404.length > backoffConfig.window) {
					recent404.shift();
				}

				if (!backoffConfig.enabled) {
					if (currentDelayMs !== 0) {
						currentDelayMs = 0;
						renderBackoffStatus(currentDelayMs);
					}
					return;
				}

				const count404 = recent404.reduce((acc, value) => acc + value, 0);
				const previousDelay = currentDelayMs;

				if (count404 >= backoffConfig.threshold) {
					currentDelayMs = Math.min(currentDelayMs + backoffConfig.stepMs, backoffConfig.maxDelayMs);
				} else if (count404 <= Math.floor(backoffConfig.threshold / 2)) {
					currentDelayMs = Math.max(currentDelayMs - backoffConfig.stepMs, 0);
				}

				if (previousDelay !== currentDelayMs) {
					renderBackoffStatus(currentDelayMs);
					appendResponse(`Backoff delay updated: ${currentDelayMs}ms (404 in window: ${count404}/${recent404.length})`);
				}
			}

			async function worker() {
				while (index < tasks.length) {
					const task = tasks[index];
					index += 1;

					const path = `/scrapper/${task.z}/${task.x}/${task.y}`;
					if (currentDelayMs > 0) {
						await sleep(currentDelayMs);
					}

					try {
						const response = await fetch(path);
						registerStatus(response.status);
						if (!response.ok) {
							appendResponse(`FAILED ${path} -> ${response.status}`);
						}
					} catch (_error) {
						registerStatus(0);
						appendResponse(`FAILED ${path} -> network error`);
					}

					completed += 1;
					if (completed % 25 === 0 || completed === tasks.length) {
						appendResponse(`Progress: ${completed}/${tasks.length}`);
					}
				}
			}

			const workers = Array.from({ length: concurrency }, () => worker());
			await Promise.all(workers);
		}

		function populateZoomLevels() {
			for (let z = MIN_ZOOM; z <= MAX_ZOOM; z += 1) {
				const row = document.createElement("label");
				row.className = "zoom-item";

				const input = document.createElement("input");
				input.type = "checkbox";
				input.value = String(z);
				input.checked = z >= 8 && z <= 12;

				const text = document.createElement("span");
				text.textContent = `Z${z}`;

				row.appendChild(input);
				row.appendChild(text);
				ui.zoomList.appendChild(row);
			}
		}

		drawInteraction.on("drawstart", () => {
			drawSource.clear();
			selectedGeometry = null;
		});

		drawInteraction.on("drawend", (event) => {
			selectedGeometry = event.feature.getGeometry();
			drawInteraction.setActive(false);

			const extent = getSelectedExtent();
			ui.extentText.textContent = JSON.stringify(extent, null, 2);
		});

		ui.drawBtn.addEventListener("click", () => {
			drawSource.clear();
			selectedGeometry = null;
			ui.extentText.textContent = "Draw rectangle on map...";
			drawInteraction.setActive(true);
		});

		ui.clearBtn.addEventListener("click", () => {
			drawSource.clear();
			selectedGeometry = null;
			ui.extentText.textContent = "No area selected";
		});

		ui.selectAllZoom.addEventListener("click", () => {
			ui.zoomList.querySelectorAll("input[type='checkbox']").forEach((box) => {
				box.checked = true;
			});
		});

		ui.clearZoom.addEventListener("click", () => {
			ui.zoomList.querySelectorAll("input[type='checkbox']").forEach((box) => {
				box.checked = false;
			});
		});

		ui.downloadBtn.addEventListener("click", async () => {
			const extent = getSelectedExtent();
			if (!extent) {
				appendResponse("Select an area first.");
				return;
			}

			const zoomLevels = getSelectedZoomLevels();
			if (zoomLevels.length === 0) {
				appendResponse("Select at least one zoom level.");
				return;
			}

			ui.downloadBtn.disabled = true;
			const backoffConfig = getBackoffConfig();
			renderBackoffStatus(0);
			appendResponse(`Starting download for zooms: ${zoomLevels.join(", ")}`);
			appendResponse(
				`404 backoff: ${backoffConfig.enabled ? "ON" : "OFF"}, window=${backoffConfig.window}, trigger=${backoffConfig.threshold}, step=${backoffConfig.stepMs}ms, max=${backoffConfig.maxDelayMs}ms`
			);

			try {
				for (const z of zoomLevels) {
					const before = await fetchTileCount(extent, z);
					appendResponse(`z=${z} before: ${JSON.stringify(before)}`);
				}

				const allTasks = [];
				for (const z of zoomLevels) {
					allTasks.push(...tileTasksForExtent(extent, z));
				}
				appendResponse(`Planned tile requests: ${allTasks.length}`);

				await downloadTiles(allTasks, backoffConfig, 8);
				appendResponse("Download complete.");

				for (const z of zoomLevels) {
					const after = await fetchTileCount(extent, z);
					appendResponse(`z=${z} after: ${JSON.stringify(after)}`);
				}
			} catch (error) {
				appendResponse(`Download error: ${error.message}`);
			} finally {
				ui.downloadBtn.disabled = false;
			}
		});

		populateZoomLevels();
	</script>
</body>
</html>
